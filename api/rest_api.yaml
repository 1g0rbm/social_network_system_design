components:
  schemas:
    BadRequest:
      type: object
      allOf:
        - $ref: '#/components/schemas/Error'
      description: Модель ошибки 400 Bad Request.
    Comment:
      type: object
      required:
        - id
        - post_id
        - author_id
        - text
        - like_count
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        post_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: ID поста.
        author_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: ID автора комментария.
        text:
          type: string
          minLength: 1
          maxLength: 1000
          description: Текст комментария.
        like_count:
          type: integer
          format: int64
          description: Количество лайков комментария.
        created_at:
          type: string
          format: date-time
          description: Время создания комментария.
        updated_at:
          type: string
          format: date-time
          description: Время обновления комментария.
      description: Модель комментария.
    CompleteUploadRequest:
      type: object
      properties:
        etag:
          type: string
          description: ETag файла (опционально).
      description: Запрос на завершение прямой загрузки файла в объектное хранилище.
    ConfirmPasswordResetRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          description: Токен сброса пароля.
        new_password:
          type: string
          minLength: 8
          description: Новый пароль в открытом виде.
      description: Запрос на подтверждение сброса пароля.
    Conflict:
      type: object
      allOf:
        - $ref: '#/components/schemas/Error'
      description: Модель ошибки 409 Conflict.
    CreateCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 1000
          description: Текст комментария.
      description: Запрос на создание комментария.
    CreatePostRequest:
      type: object
      required:
        - title
        - text
        - location_id
        - media_ids
      properties:
        title:
