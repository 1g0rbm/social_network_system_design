components:
  schemas:
    Comment:
      type: object
      required:
        - id
        - post_id
        - author_id
        - text
        - like_count
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        post_id:
          $ref: '#/components/schemas/uuid'
        author_id:
          $ref: '#/components/schemas/uuid'
        text:
          type: string
        like_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ConfirmPasswordResetRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
        new_password:
          type: string
    CreateCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
    CreatePostRequest:
      type: object
      required:
        - title
        - text
        - location_id
        - media_ids
      properties:
        title:
          type: string
        text:
          type: string
        location_id:
          $ref: '#/components/schemas/uuid'
        media_ids:
          type: array
          items:
            $ref: '#/components/schemas/uuid'
          maxItems: 5
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    Location:
      type: object
      required:
        - id
        - title
        - description
        - lat
        - lon
        - media
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        title:
          type: string
        description:
          type: string
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string
    Media:
      type: object
      required:
        - id
        - url
        - mime_type
        - width
        - height
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        url:
          type: string
        mime_type:
          type: string
        width:
          type: integer
        height:
          type: integer
        created_at:
          type: string
          format: date-time
    OAuthLoginRequest:
      type: object
      required:
        - provider
        - code
        - redirect_uri
      properties:
        provider:
          type: string
          enum:
            - google
            - vk
            - yandex
        code:
          type: string
        redirect_uri:
          type: string
    PostFull:
      type: object
      required:
        - text
        - media
      properties:
        text:
          type: string
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
      allOf:
        - $ref: '#/components/schemas/PostPreview'
    PostPreview:
      type: object
      required:
        - id
        - author_id
        - title
        - location_id
        - like_count
        - comment_count
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        author_id:
          $ref: '#/components/schemas/uuid'
        title:
          type: string
        location_id:
          $ref: '#/components/schemas/uuid'
        like_count:
          type: integer
          format: int64
        comment_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReactionType:
      type: string
      enum:
        - like
        - dislike
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        avatar_url:
          type: string
    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    SetReactionRequest:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ReactionType'
    TokenPair:
